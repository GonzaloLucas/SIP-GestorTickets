{% extends 'base.html' %}

{% block title %}Login — Assistech{% endblock %}

{% block content %}
<div class="w-full max-w-md mx-auto px-4 sm:px-6 py-8 sm:py-12">
    
    <div class="mb-6 sm:mb-8 text-center">
        <h2 class="text-3xl font-bold tracking-tight">Iniciar sesión</h2>
        <p class="mt-2 text-sm text-assist-gray">Accedé a tu cuenta de Assistech</p>
    </div>

    {% if error %}
        <div class="mb-6 px-4 py-3 rounded-xl border border-red-500/30 bg-red-500/10 text-red-400 text-sm">
            {{ error }}
        </div>
    {% endif %}

    <form method="post" class="space-y-2">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit"
            class="w-full bg-assist-coral text-white font-semibold py-3 rounded-xl hover:bg-opacity-90 transition mt-2">
            Entrar
        </button>
    </form>

</div>
{% endblock %}
