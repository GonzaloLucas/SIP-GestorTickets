{% extends 'base.html' %}

{% block title %}Confirmar Baja — Assistech{% endblock %}

{% block content %}
<div class="w-full max-w-md mx-auto px-6 py-8 bg-assist-charcoal border border-white/10 rounded-2xl text-center mt-20 shadow-2xl">
    <h2 class="text-2xl text-white mt-4">¿Qué desea hacer con <strong class="text-white">{{ empleado.get_full_name }}</strong>?</h2>

    <div class="flex items-center justify-center gap-4 mt-8">
        <a href="{% url 'dashboard' %}" 
           class="flex-1 bg-white/5 border border-white/10 text-white font-medium py-2.5 rounded-xl hover:bg-white/10 transition text-sm text-center">
            Cancelar
        </a>

        <a href="{% url 'quitar_acceso' empleado.pk %}" 
           class="flex-1 bg-orange-500 text-white font-bold py-2.5 rounded-xl hover:bg-orange-600 transition text-sm text-center">
            Suspender
        </a>
        
        <a href="{% url 'eliminar_usuario_definitivo' empleado.pk %}" 
           class="flex-1 bg-red-500 text-white font-bold py-2.5 rounded-xl hover:bg-red-600 transition text-sm text-center">
            Eliminar Definitivamente
        </a>
    </div>

</div>
{% endblock %}
