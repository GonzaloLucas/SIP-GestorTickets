{% extends 'base.html' %}
{% block title %}Clave Actualizada — Assistech{% endblock %}

<div class="w-full max-w-md mx-auto px-4 sm:px-6 py-8 sm:py-12 text-center bg-assist-charcoal border border-white/10 rounded-2xl shadow-2xl mt-10">
    <h2 class="text-2xl font-bold text-white mt-4">¡Contraseña modificada!</h2>
    <p class="text-sm text-assist-gray mt-2 leading-relaxed">
        Tu contraseña fue actualizada con éxito. Ya podés ingresar a tu panel de control usando tus nuevas credenciales de acceso.
    </p>
    <a href="{% url 'login' %}" class="inline-block mt-6 w-full bg-assist-coral text-white font-semibold py-3 rounded-xl hover:bg-opacity-90 transition">
        Iniciar Sesión
    </a>
</div>
{% endblock %}
