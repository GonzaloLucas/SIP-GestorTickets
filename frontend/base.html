{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Assistech{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'usuarios/logo-solo.png' %}" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'assist-black': '#000000',
                        'assist-dark': '#111111',
                        'assist-gray': '#AAAAAA',
                        'assist-white': '#FFFFFF',
                        'assist-coral': '#F25C54',
                    },
                    boxShadow: {
                        'assist-glow': '0 0 50px 10px rgba(111, 66, 193, 0.25)',
                    }
                }
            }
        }
    </script>
    
    <style>
        form p {
            margin-bottom: 1.5rem;
        }
        form label {
            display: block;
            margin-bottom: 0.5rem;
            color: #AAAAAA;
            font-size: 0.875rem;
            font-weight: 500;
        }
        form input:not([type="checkbox"]):not([type="radio"]), form select, form textarea {
            width: 100%;
            padding: 0.75rem;
            background-color: transparent;
            border: 1px solid #333333;
            border-radius: 0.75rem;
            color: #FFFFFF;
            appearance: none;
        }
        form input:focus {
            outline: none;
            border-color: #6F42C1;
            box-shadow: 0 0 10px rgba(111, 66, 193, 0.5);
        }
        form select option {
            background-color: #111827;
            color: #FFFFFF;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-[#111827] text-assist-white min-h-screen font-sans flex flex-col overflow-x-hidden">

    {% block navbar %}
    <nav class="border-b border-white/5 bg-[#121212]/90 backdrop-blur-md px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            
            <a href="{% url 'landing' %}" class="flex items-center gap-3 hover:opacity-80 transition">
                <img src="{% static 'usuarios/logo-solo.png' %}" alt="Logo Assistech" class="h-8 w-8 object-contain">
                <span class="text-xl font-bold tracking-tight text-white">Assistech</span>
            </a>

            <div class="flex items-center gap-4 text-sm">
                {% if user.is_authenticated %}
                    <span class="text-zinc-500 hidden sm:inline">Hola, {{ user.username }}</span>
                {% endif %}
            </div>

        </div>
    </nav>
    {% endblock %}

    <main class="flex-1 flex flex-col justify-center w-full max-w-full min-w-0">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
