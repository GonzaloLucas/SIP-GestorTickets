{% extends 'base.html' %}

{% block title %}Registrar Empresa — Assistech{% endblock %}

{% block content %}
<div class="w-full max-w-md mx-auto px-6 py-12">

    <div class="mb-8 text-center">
        <h2 class="text-3xl font-bold tracking-tight">Registrar tu Empresa</h2>
        <p class="mt-2 text-sm text-assist-body">Creá el espacio de trabajo y tu cuenta de administrador</p>
    </div>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        <div class="space-y-2">
            {{ form.as_p }}
        </div>

        <button type="submit"
            class="w-full bg-assist-coral text-white font-bold py-4 rounded-2xl hover:brightness-110 transition mt-6 shadow-lg block text-center text-base">
            Crear Empresa y Administrador
        </button>
    </form>

    <p class="mt-6 text-center text-sm text-assist-body">
        ¿Ya tenés empresa?
        <a href="{% url 'login' %}" class="text-assist-white font-medium hover:underline">Iniciá sesión</a>
    </p>

</div>
{% endblock %}
