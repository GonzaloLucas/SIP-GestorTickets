{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto pt-24 px-6">
    
    <h2 class="text-3xl font-bold mb-6">Panel de Control Global (Jefe de Soporte)</h2>

    <div class="flex gap-4 mb-8">
        <div class="p-6 bg-zinc-900 border border-zinc-800 rounded-xl">
            <p class="text-assist-gray">Total de Tickets</p>
            <strong class="text-2xl text-white">{{ tickets.count }}</strong>
        </div>
        <a href="{% url 'logout' %}" class="self-center text-red-400 hover:underline">Cerrar Sesión</a>
    </div>

    <h3 class="text-xl font-semibold mb-4 text-assist-gray">Todos los Tickets del Sistema</h3>
    
    <div class="overflow-x-auto rounded-xl border border-zinc-800">
        <table class="w-full text-left border-collapse bg-zinc-900/50">
            <thead>
                <tr class="bg-zinc-800/50 text-assist-gray text-sm">
                    <th class="p-4">ID</th>
                    <th class="p-4">Solicitante</th>
                    <th class="p-4">Título</th>
                    <th class="p-4">Prioridad</th>
                    <th class="p-4">Estado</th>
                    <th class="p-4">Asignado a</th>
                    <th class="p-4">Acciones</th>
                </tr>
            </thead>
        </table>
    </div>
</div>
{% endblock %}
