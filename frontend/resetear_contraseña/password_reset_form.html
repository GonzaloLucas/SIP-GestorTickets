{% extends 'base.html' %}
{% block title %}Restablecer Contraseña — Assistech{% endblock %}
{% block content %}
<div class="w-full max-w-md mx-auto px-4 sm:px-6 py-8 sm:py-12">
    <div class="mb-6 sm:mb-8 text-center">
        <h2 class="text-3xl font-bold tracking-tight">Recuperar Clave</h2>
        <p class="mt-2 text-sm text-assist-gray">Ingresá tu email y te mandaremos un link seguro para cambiar tu contraseña.</p>
    </div>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="text-sm text-assist-gray block mb-2">Email:</label>
            <input type="email" name="email" autocomplete="email" class="w-full rounded-md border border-white/10 bg-assist-slate px-3 py-2 text-white focus:outline-none focus:ring-1 focus:ring-assist-accent" required>
        </div>
        <button type="submit" class="w-full bg-assist-coral text-white font-semibold py-3 rounded-xl hover:bg-opacity-90 transition">
            Enviar Email de Recuperación
        </button>
    </form>
</div>
{% endblock %}
